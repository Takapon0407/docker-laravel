name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - develop

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            このPRのコードレビューを日本語で実施してください。
            以下の観点で確認してください。

            - コードの品質・可読性
            - バグや潜在的な問題
            - セキュリティ上の懸念点（SQLインジェクション、XSS、認証・認可の不備など）
            - Laravelのベストプラクティスへの準拠
            - パフォーマンス上の問題

            指摘事項は最も重要なものを3つまでに絞り、PRコメントとして投稿してください。
            問題がない場合はその旨も伝えてください。
          claude_args: "--max-turns 5"
